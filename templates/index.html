<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Health Predictor</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container fade-in">
    <h1 class="fade-in fade-delay-1">AI Health Predictor</h1>
    <p class="fade-in fade-delay-2">Select your symptoms and get an AI-based prediction.</p>

    <form method="POST" class="fade-in fade-delay-3">
        <select name="symptoms" multiple size="10" style="width:100%; padding:10px;">
            {% for symptom in symptoms %}
                <option value="{{ symptom }}">{{ symptom.replace("_", " ").title() }}</option>
            {% endfor %}
        </select>

        <br><br>
        <button type="submit">Predict</button>
    </form>

    {% if prediction %}
    <div class="result fade-in fade-delay-2">
        🩺 <strong>Prediction:</strong> {{ prediction }}
    </div>
    {% endif %}
</div>

</body>
</html>
